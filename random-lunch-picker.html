<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Random Lunch Picker</title>
<meta name="description" content="Pick a random lunch idea instantly.">
<style>
body{
font-family:Arial;
text-align:center;
background:#111;
color:white;
padding:40px;
}
button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:10px;
background:#3498db;
color:white;
}
a{
color:#aaa;
display:block;
margin-top:20px;
text-decoration:none;
}
</style>
</head>
<body>

<h1>🍱 Random Lunch Picker</h1>
<p>Need help choosing lunch?</p>

<button onclick="pickLunch()">Pick Lunch</button>

<h2 id="result"></h2>

<script>
const lunches=[
"Chicken Wrap",
"Burger",
"Caesar Salad",
"Shawarma",
"Sushi",
"Pasta",
"Rice Bowl",
"Grilled Chicken Sandwich",
"Tacos",
"Noodles"
];

function pickLunch(){
const randomLunch=lunches[Math.floor(Math.random()*lunches.length)];
document.getElementById("result").innerText=randomLunch;
}
</script>

<a href="/">← Back to FoodMatch</a>
<a href="/what-to-eat-tonight.html">What should I eat tonight?</a>

</body>
</html>

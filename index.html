<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FoodMatch</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#111;
color:white;
padding:40px;
}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:10px;
background:#ff6b00;
color:white;
}
</style>

</head>

<body>

<h1>🍔 FoodMatch</h1>
<p>What should you eat today?</p>

<button onclick="pickFood()">Pick My Food</button>

<h2 id="result"></h2>

<script>

const foods=[
"Pizza",
"Burger",
"Sushi",
"Shawarma",
"Pasta",
"Tacos",
"Steak",
"Salad",
"Ramen",
"Fried Chicken"
];

function pickFood(){
const randomFood=foods[Math.floor(Math.random()*foods.length)];
document.getElementById("result").innerText=randomFood;
}

</script>

</body>
</html>
